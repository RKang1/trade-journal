name: trade-journal

services:
  api:
    build:
      context: ./backend
      dockerfile: src/TradeJournal.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__Postgres: "${TRADE_JOURNAL_DB_CONNECTION:-Host=postgres;Port=5432;Database=trade_journal;Username=trade_journal;Password=trade_journal}"
      Auth__GoogleClientId: "${TRADE_JOURNAL_GOOGLE_CLIENT_ID:-REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com}"
      Auth__JwtSigningKey: "${TRADE_JOURNAL_JWT_SIGNING_KEY:-REPLACE_WITH_AT_LEAST_32_BYTES_OF_RANDOM_ENTROPY_xxxxxxx}"
      Cors__AllowedOrigins__0: "${TRADE_JOURNAL_CORS_ORIGIN:-http://localhost:4200}"
    ports:
      - "${TRADE_JOURNAL_API_BIND:-127.0.0.1}:${TRADE_JOURNAL_API_PUBLISHED_PORT:-15211}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TRADE_JOURNAL_API_BASE_URL: "${TRADE_JOURNAL_FRONTEND_API_BASE_URL:-http://localhost:5211}"
      TRADE_JOURNAL_GOOGLE_CLIENT_ID: "${TRADE_JOURNAL_GOOGLE_CLIENT_ID:-REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com}"
    ports:
      - "${TRADE_JOURNAL_FRONTEND_BIND:-127.0.0.1}:${TRADE_JOURNAL_FRONTEND_PUBLISHED_PORT:-14200}:80"
    depends_on:
      - api

  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    container_name: trade-journal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trade_journal
      POSTGRES_USER: trade_journal
      POSTGRES_PASSWORD: trade_journal
    ports:
      - "5432:5432"
    volumes:
      - trade-journal-pg:/var/lib/postgresql/data

volumes:
  trade-journal-pg:
